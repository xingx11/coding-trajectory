language = "lua"
prompt_qwen = """You are working in a local project directory. Read the relevant code before changing anything. Do not commit, and do not write tokens or secrets into files.

There is a bug in this CorsixTH project: when a player customizes handyman task priorities (watering plants, fixing machines, sweeping litter) through the staff management dialog and then saves and reloads the game, all priority settings revert to their defaults. The root cause spans multiple files:

1. In `CorsixTH/Lua/entities/humanoids/staff/handyman.lua`, the `Handyman:afterLoad` method does not restore the `task_priorities` table that was serialized into the save data.
2. In `CorsixTH/Lua/hospital.lua`, the `Hospital:loadFromSavedGame` method re-initializes handyman task queues without consulting the restored priority values, overwriting them with defaults.

Fix the bug so that:
- Handyman task priorities are correctly written into the save table during serialization.
- The `afterLoad` cycle properly deserializes and restores the `task_priorities` table for each handyman.
- The hospital task-queue rebuild after loading respects individual handyman priority settings rather than applying defaults.
- The staff management dialog (`CorsixTH/Lua/dialogs/staff_management.lua`) correctly displays restored priorities after a load.
- Default behavior is preserved when priorities were never customized by the player."""
followups_qwen = [
  "Add a unit test in the test suite that serializes a handyman with custom task priorities, deserializes it, and asserts that all priority values are preserved exactly.",
  "The staff management dialog currently does not visually indicate when a handyman has non-default priorities. Add a small icon or color highlight next to handymen with customized priority settings in the staff list.",
  "Ensure that if a save file from an older version lacks the task_priorities field, the afterLoad method gracefully falls back to defaults without crashing.",

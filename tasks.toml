# =============================================================================
# tasks.toml — Coding Trajectory pipeline configuration
# =============================================================================
# This file is the core configuration for the ctpipe pipeline.
#
# [batch] section: global settings for a delivery batch.
# [[task]] entries: one per coding task (auto-generated by `ctpipe gen` or manually written).
#
# Key paths:
#   runs_root  — where project clones are created for execution
#                (e.g. runs_root/CT-0001-qwen/, runs_root/CT-0001-claude/)
#   project_path — source project to clone from (local path or GitHub clone)
#
# Quick start:
#   1. Fill in [batch] with your paths
#   2. Run `python -m ctpipe gen --count 10` to auto-generate tasks
#   3. Run `python -m ctpipe all` to execute the full pipeline
# =============================================================================

[batch]
delivery_date = "20260605"
runs_root = "D:\\path\\to\\runs"
max_parallel = 3

# =============================================================================
# Tasks are appended below, either by `ctpipe gen` or manually.
# Example format:
#
# [[task]]
# id = "CT-0001"
# project_path = "D:\\path\\to\\source\\project"
# clone_method = "git"
# task_type = "bug-fix"
# domain = "web_frontend"
# language = "ts"
# prompt_qwen = """You are working in a local project directory. ..."""
# followups_qwen = ["...", "..."]
# prompt_claude = """You are working in a local project directory. ..."""
# followups_claude = ["...", "...", "...", "...", "..."]
# =============================================================================

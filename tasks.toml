prompt_qwen = """You are working in a local project directory. Read the relevant code before changing anything. Do not commit, and do not write tokens or secrets into files.

There is a substring-collision bug in `ctpipe/finalize.py`. The issue-attribution logic at line ~100-102 builds `task_prefix = f'[{task.id}]'` and `task_slash = f'[{task.id}/'` and filters issues with `task_prefix in i or task_slash in i`. When one task ID is a prefix of another (e.g., 'api-1' vs 'api-12'), the string '[api-1/' is a substring of '[api-12/qwen]', so task api-12's issues get incorrectly attributed to api-1. This corrupts the `has_missing_data` flag, writes wrong `finalize_status` values to `PipelineState`, and shows misleading WARN/OK labels in the summary.

The same bug exists in the summary loop at line ~145-147 where WARN/OK status is determined.

Fix both locations so that issue strings are matched using exact task-ID boundaries — for example, by ensuring the character immediately after the task ID inside brackets is either `]` or `/` and nothing else. You may use regex or any other reliable approach.

After fixing, create a test file `tests/test_finalize_attribution.py` with unit tests that:
1. Set up two tasks with prefix-colliding IDs (e.g., 'api-1' and 'api-12') and a list of issue strings attributed to each.
2. Verify that issues for 'api-12' are NOT matched when filtering for 'api-1'.
3. Verify that issues for 'api-1' still correctly match for 'api-1'.
4. Confirm that non-colliding task IDs continue to work as before."""
followups_qwen = [
  "Add edge-case tests for task IDs that are entirely contained in other IDs beyond just numeric suffixes, for example 'web' vs 'web-app' and 'db' vs 'db-cache', and make sure the fix handles them correctly.",
  "Extract the issue-matching logic into a reusable helper function (e.g., `_issues_for_task(issues, task_id)`) in `finalize.py` so both the has_missing_data filter and the summary loop call the same function, eliminating duplication.",
  "Run the full test suite and ensure no regressions — check that existing tests, if any, for finalize still pass after your changes.",
]
prompt_claude = """You are working in a local project directory. Read the relevant code before changing anything. Do not commit, and do not write tokens or secrets into files.

In `ctpipe/finalize.py`, there is a bug caused by substring matching in the issue-attribution logic. At lines ~100-102, the code constructs `task_prefix = f'[{task.id}]'` and `task_slash = f'[{task.id}/'`, then filters issues using `task_prefix in i or task_slash in i`. This is broken when one task's ID is a prefix of another: for instance, if tasks 'api-1' and 'api-12' both exist, the pattern '[api-1/' is a substring of '[api-12/qwen]', causing api-12's issues to be falsely attributed to api-1. The resulting `has_missing_data` value, the `finalize_status` written to `PipelineState`, and the WARN/OK summary label are all incorrect for api-1.

The identical substring-collision bug appears in the summary output loop at line ~147, where WARN vs OK status is decided.

Your task:
1. Fix the matching logic at both locations (the `task_issues` filter near line 102 and the summary status check near line 147) so that only issues belonging exactly to the given task ID are matched. Ensure a task ID like 'api-1' does not match issue tags like '[api-12/qwen]' or '[api-100]'. You may use regex with `re.escape`, or a structural string check — either approach is fine as long as it handles arbitrary task IDs correctly.
2. Create `tests/test_finalize_attribution.py` with unit tests that exercise prefix-colliding task IDs (e.g., 'api-1' and 'api-12', or 'task-3' and 'task-30') and verify that issue attribution is exact. Also verify that existing non-colliding task IDs remain unaffected by the fix."""
followups_claude = [

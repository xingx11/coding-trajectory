project_path = "D:\\path\\to\\runs\\_projects\\vllm-omni"
clone_method = "git"
task_type = "feature"
domain = "ai_ml"
language = "python"
prompt_qwen = """You are working in a local project directory. Read the relevant code before changing anything. Do not commit, and do not write tokens or secrets into files.

Implement a new `ctpipe status` CLI subcommand that reports pipeline progress for each task and stage. Create a new file `ctpipe/status.py` containing the reporting logic, and register the subcommand in `ctpipe/cli.py`.

Requirements:
1. The `status` subcommand must accept `--tasks`, `--models`, and `--json` arguments following the same conventions as existing subcommands (e.g., `--tasks` uses `nargs="*"`, `--models` uses `nargs="*"` with `choices=["qwen", "claude"]` defaulting to both).
2. Read the `PipelineState` from `delivery_dir/pipeline_state.json` and use `select_delivery_tasks` from `ctpipe/config.py` to enumerate task×model combinations.
3. For each task×model pair, determine the status of each pipeline stage (prepare, run, collect, score, finalize). Note that `prepare` and `finalize` are not model-specific (they use `model=None` in PipelineState), while `run`, `collect`, and `score` are model-specific.
4. Each cell in the output should display one of: done, failed, partial, or pending (pending means no status entry exists).
5. Human-readable output: print a formatted table with columns `task_id`, `model`, `prepare`, `run`, `collect`, `score`, `finalize`. Print a summary line at the bottom showing how many task×model pairs are fully complete (all 5 stages done) vs total.
6. When `--json` is passed, output valid JSON as a list of objects with the same fields, plus a `summary` object.
7. `--tasks` and `--models` filters must restrict which rows are displayed.
8. Exit with code 0 if all displayed task×model pairs have all stages done; exit with code 1 otherwise (useful for CI gating)."""
followups_qwen = [
  "Add a `--stage` filter argument that restricts output to only the specified pipeline stages (e.g., `--stage run score`), and update both table and JSON output accordingly.",
  "Add color-coded output (green for done, red for failed, yellow for partial, dim for pending) when stdout is a TTY, using ANSI escape codes with automatic detection that disables colors when piped.",
  "Add a `--watch` flag that re-renders the status table every 5 seconds until interrupted with Ctrl+C, clearing the terminal between refreshes.",
]
prompt_claude = """You are working in a local project directory. Read the relevant code before changing anything. Do not commit, and do not write tokens or secrets into files.

Add a `status` subcommand to the `ctpipe` CLI that provides a clear overview of pipeline progress across all tasks and stages. This involves creating `ctpipe/status.py` and wiring it into `ctpipe/cli.py`.

Detailed requirements:
1. Create `ctpipe/status.py` with the core reporting function. It should accept the `BatchConfig`, optional task ID filters, optional model filters, and a boolean flag for JSON output.
2. Register a `status` subparser in `cli.py` with arguments `--tasks` (nargs="*"), `--models` (nargs="*", choices=["qwen", "claude"], default=["qwen", "claude"]), and `--json` (store_true) — matching the patterns used by other subcommands.
3. The command loads `PipelineState` from `config.delivery_dir / "pipeline_state.json"` and iterates over tasks obtained via `select_delivery_tasks(config, task_ids)`.
4. For each task×model pair, query the state for each of the five stages: prepare, run, collect, score, finalize. Remember that `prepare` and `finalize` do not take a model parameter in `PipelineState.get()`, while `run`, `collect`, and `score` do.
5. Map the status field to one of four display values: `done`, `failed`, `partial`, or `pending` (when the status key is empty or absent).
6. In default (human-readable) mode, print an aligned table with columns: task_id, model, prepare, run, collect, score, finalize. Below the table, print a summary line like `12/20 task×model pairs fully complete`.
7. When `--json` is passed, output a JSON object with a `rows` array (each row having task_id, model, and stage statuses) and a `summary` object with `complete` and `total` counts.
8. Apply `--tasks` and `--models` filters to restrict displayed rows.
9. The command must exit with code 0 when every displayed row is fully done across all stages, and code 1 otherwise, enabling CI gate usage."""
followups_claude = [
  "Add a `--stage` filter argument (nargs=\"*\", choices=[\"prepare\",\"run\",\"collect\",\"score\",\"finalize\"]) that limits the displayed columns to only selected stages, updating both table and JSON output modes.",
  "Implement ANSI color-coded output for the human-readable table: green for done, red for failed, yellow for partial, dim/gray for pending. Auto-detect whether stdout is a TTY and disable colors when output is piped or when `--no-color` is passed.",
  "Add a `--fail-threshold` option (float, 0.0-1.0) that changes the exit code logic: exit 0 if the fraction of fully-complete pairs is at or above the threshold, exit 1 otherwise. Default to 1.0 (all must be complete) for backward compatibility.",
  "Add a `--watch` / `-w` flag that continuously re-renders the status table every N seconds (configurable via `--interval`, default 5) until Ctrl+C, clearing the terminal between refreshes to show live progress.",
  "Add a `--export-csv` option that writes the status table to a CSV file at the given path, with the same columns as the human-readable table plus a boolean `all_done` column per row.",

task_title = "修复 JWT Token 过期时并发 API 请求引发的竞态条件和重复刷新问题"
task_description = """当 app_concurrency.go 中多个 goroutine 同时向 App Store Connect API 发起请求时，若 JWT token 恰好过期，多个 goroutine 会同时检测到 401 响应并各自调用 app_auth.go 中的 token 刷新逻辑，导致：(1) 同一时刻生成多个新 token，旧 token 被覆盖后部分 goroutine 仍持有已失效的中间 token，请求继续失败；(2) 在高并发场景下偶发 panic: concurrent map writes（app_types.go 中的 tokenCache map 非并发安全）。需要在 app_auth.go 中引入 sync.Once 或 singleflight 机制，确保同一过期窗口内仅执行一次 token 刷新，其余 goroutine 等待并复用新 token。同时修复 app_types.go 中 tokenCache 的并发写入问题。"""
acceptance_criteria = [
  "在 app_auth.go 中使用 sync.Once 或 golang.org/x/sync/singleflight 确保同一过期窗口内仅执行一次 token 刷新，其余 goroutine 阻塞等待并复用结果",
  "将 app_types.go 中的 tokenCache 替换为 sync.Map 或加互斥锁保护，消除 concurrent map writes panic",
  "app_concurrency.go 中并发请求收到 401 时统一走刷新-重试路径，不再各自独立刷新",

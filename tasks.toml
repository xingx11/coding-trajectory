  "Write a test that constructs a realistic `issues` list with mixed issue types (missing score, unscored template, provider mismatch, threshold warnings) for both colliding and non-colliding task IDs, and asserts that `has_missing_data` is computed correctly for each task.",
  "Review whether the threshold-check issues appended at lines 110-117 (which use the `[{task.id}]` format without a model suffix) are also affected by the collision, and add test coverage for that format as well.",

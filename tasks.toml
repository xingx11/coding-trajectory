prompt_qwen = """You are working in a local project directory. Read the relevant code before changing anything. Do not commit, and do not write tokens or secrets into files.

There is a race condition bug in `src/disk/longbow.slidercaptcha.js`. When the user drags the slider and releases it, a verify request is sent to the server. If the user quickly starts a new drag before the server response arrives, the captcha enters an inconsistent state: the first response's reset handler fires and visually resets the slider, but the internal `trail` array still holds coordinate points from the new (second) drag session. On the next verify submission, a corrupted merged trajectory (leftover old points + new points) is sent to the server, causing verification to fail.

Fix this race condition. Your fix must:

1. Introduce a drag session identifier (e.g., a generation counter or unique ID) that increments each time a new drag begins.
2. When a new drag starts, ensure the trail/trajectory array is cleared immediately at drag-start, not deferred to when a server response arrives.
3. When a verify response callback fires, check whether the current session ID still matches the session that initiated the request. If a newer drag session has started, ignore the stale response entirely — do not reset the slider position, do not clear the trail, and do not call success/fail handlers that would disrupt the active drag.
4. The slider UI must not snap, jump, or glitch if a stale response arrives during an active drag.
5. Normal single-drag-then-wait verification flow must continue to work exactly as before.
6. Add a comment block near the fix explaining what race condition existed and how the session tracking resolves it.

Key files: `src/disk/longbow.slidercaptcha.js`, `src/index.html`."""

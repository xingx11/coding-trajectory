language = "shell"
task_title = "解释 retry 模块的级联重试与下游传播机制"
task_description = """ctpipe 的 retry 模块实现了一套级联重试机制：当某个管道阶段失败时，不仅重试该阶段本身，还会自动传播到下游阶段。请深入阅读 ctpipe/retry.py、ctpipe/state.py 和 ctpipe/config.py，完整解释以下内容：

1. `_DOWNSTREAM` 字典如何定义阶段间的依赖关系，以及 `_expand_cascade` 函数如何根据 model-agnostic 阶段（prepare/finalize）和 model-specific 阶段（run/collect/score）的区别进行不同的扇出逻辑。
2. `retry()` 主函数的多轮重试循环：每轮如何区分 exhausted（超过最大重试次数）和 retryable 条目，如何在 reset 前保存 retry_count 以防止计数丢失，以及 `_mark_permanently_failed` 的终态标记策略。
3. `PipelineState` 的 `batch()` 上下文管理器和 `set()` 方法中 `retry_count` 的保留机制如何配合 retry 模块工作，确保状态更新的原子性和计数一致性。

请用 shell 脚本编写一个演示脚本 `docs/explain_retry_cascade.sh`，通过构造模拟 pipeline_state.json 并运行 `ctpipe retry --dry-run` 命令来展示级联行为，脚本中用注释详细解释每个步骤的预期输出。"""
acceptance_criteria = [
  "演示脚本 docs/explain_retry_cascade.sh 可执行，包含至少3个场景：prepare 失败的全量扇出、run/qwen 失败的单模型级联、retry_count 超限的永久失败标记",
  "脚本中的注释准确解释了 _expand_cascade 对 model-agnostic（走 for model in models 循环+continue）和 model-specific（携带自身 model）两种分支的区别",
  "注释准确说明了 saved_counts 机制：为什么必须在 _reset_entries 之前读取 retry_count，以及 _increment_retry_count 如何使用 saved_counts 参数恢复计数",
  "注释解释了 PipelineState.set() 中 retry_count 的 preserve 逻辑：当 status 字段变更时，如果调用方未显式提供 retry_count，则从 existing 状态中继承",
]

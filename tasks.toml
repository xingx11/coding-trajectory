[[task]]
id = "CT-0002"
project_path = "D:\\path\\to\\runs\\_projects\\mini-redis"
clone_method = "git"
task_type = "bug-fix"
domain = "backend_service"
language = "rust"
prompt_qwen = """You are working in a local project directory. Read the relevant code before changing anything. Do not commit, and do not write tokens or secrets into files.

There is a race condition bug in this mini-redis implementation. When a key is set with an expiration (e.g., `SET key value PX 100`), the GET command in `src/cmd/get.rs` retrieves the value from the shared state HashMap via `src/db.rs` without checking whether the key's expiration instant has already passed. The background purge task in `src/db.rs` only removes expired entries on a periodic interval, so between purge cycles GET can return stale data for keys whose TTL has already elapsed.

Fix this bug so that the GET path checks the entry's `expires_at` field against `Instant::now()` at read time, returns `None` if the key is expired, and optionally removes the expired entry eagerly. The expiration check must be inside the db-level get method so all read paths benefit from it. Existing tests must continue to pass. Add a new integration test in `tests/server.rs` that demonstrates GET returns nil immediately after a short PX expiry (e.g., PX 1 with a small sleep) without relying on the background purge interval."""
followups_qwen = [
  "Add a similar expiration check to any other db read methods (e.g., if there is a key-existence check or a method used by other commands) to ensure consistency across the entire read layer.",
  "Implement a metric counter that tracks how many keys were lazily evicted at read time versus removed by the background purge task, and log it at debug level.",
]
prompt_claude = """You are working in a local project directory. Read the relevant code before changing anything. Do not commit, and do not write tokens or secrets into files.

This mini-redis project has a bug involving the interaction between `src/db.rs` and `src/cmd/get.rs`. When a key is stored with a TTL via `SET key value PX milliseconds`, the GET command fetches the value from the shared state without verifying whether the key's expiration time has already passed. Because the background purge task in `src/db.rs` sweeps expired entries only periodically, a GET issued between purge cycles will return data for keys that should already be considered expired.

Your task is to fix this race condition:
1. Modify the get method in `src/db.rs` to compare the entry's `expires_at` field against `Instant::now()` before returning the value.
2. If the key is expired, return `None` (which translates to a Null frame in the response).
3. Optionally remove the expired entry eagerly upon detection.
4. Ensure the fix lives in the db-layer get method so every command that reads keys benefits.
5. Verify all existing tests still pass.
6. Write a new integration test in `tests/server.rs` proving that GET returns nil for a key immediately after its short PX expiry (e.g., PX 1 followed by a brief sleep), independent of the purge cycle."""
followups_claude = [
  "Add a similar inline expiration check to any other db read paths (such as key-existence queries or commands like MGET if they exist) to ensure full consistency.",
  "Write an additional test that sets multiple keys with different PX values and verifies that each returns nil at the correct time, confirming per-key granularity of the fix.",
  "Implement a debug-level log message when a key is lazily evicted at read time (as opposed to being removed by the background purge), including the key name and how far past expiry it was.",
  "Ensure the eager removal path (if implemented) does not introduce a deadlock by verifying that the lock acquisition order is consistent with the background purge task.",
  "Add a doc comment on the db get method explaining the lazy expiration contract so future contributors understand the dual eviction strategy (background purge + inline check).",
]

[[task]]
id = "CT-0003"
project_path = "D:\\path\\to\\runs\\_projects\\solace-agent-mesh"
clone_method = "git"
task_type = "feature"
domain = "business_logic"
language = "python"
prompt_qwen = """You are working in a local project directory. Read the relevant code before changing anything. Do not commit, and do not write tokens or secrets into files.

Implement a `ctpipe retry` subcommand that automatically recovers failed or partially completed pipeline tasks. The feature requires the following:

1. Create a new file `ctpipe/retry.py` containing a public async function `retry_failed(config: BatchConfig, task_ids: list[str] | None, models: list[str] | None, max_retries: int = 2, backoff_base: float = 5.0, stages: list[str] | None = None)` that orchestrates retrying failed pipeline entries.

2. Register the `retry` subcommand in `ctpipe/cli.py` with these arguments:
   - `--tasks` (optional, nargs="*"): filter to specific task IDs
   - `--models` (optional, nargs="*", choices=["qwen", "claude"]): filter to specific models
   - `--max-retries` (type=int, default=2): maximum retry attempts per failed entry
   - `--backoff-base` (type=float, default=5): base seconds for exponential backoff
   - `--stages` (optional, nargs="*", choices=["prepare", "run", "collect", "score"]): restrict which stages get retried

3. The retry logic must:
   - Load `PipelineState` from `delivery_dir/pipeline_state.json` and use `select_delivery_tasks` from `ctpipe/config.py` to enumerate eligible task×model combinations.
   - Scan for entries with status `"failed"` or `"partial"` across the stages: prepare, run, collect, score.
   - For each failed entry, call `state.reset()` for that task/stage/model before re-invoking the corresponding stage function (`prepare.prepare` for the prepare stage, `run.run_single` for run, `collect.collect_single` for collect, `score.score_single` for score).
   - Apply exponential backoff between retry attempts using the formula: wait = `backoff_base * (2 ** attempt)` seconds, where attempt starts at 0.
   - If no failed tasks are found, print a message like "No failed or partial tasks found. Nothing to retry." and return exit code 0.

4. After all retries complete, print a summary table to stdout showing columns: task_id, model, stage, attempts, final_status (use "recovered" if the task now has status "done", otherwise "still_failed").

5. Update `PipelineState` entries for retried tasks to include a `retry_count` integer field reflecting the total number of retry attempts made, so the finalize stage can report this.

Study the existing subcommand patterns in `cli.py`, the `PipelineState` API in `state.py`, `select_delivery_tasks` in `config.py`, and the signatures of `run_single`, `collect_single`, and `score_single` before writing code. Match the project's existing style (type hints, imports, print formatting)."""
followups_qwen = [
  "The exponential backoff currently blocks the event loop with `asyncio.sleep`. Verify that the backoff uses `await asyncio.sleep(...)` and not `time.sleep(...)`. Also, add a `--dry-run` flag to the retry subcommand that scans and prints which tasks would be retried (with their stage and current status) but does not actually execute any retries or modify state.",
  "Add proper error handling to `retry_failed` so that if a stage function raises an unexpected exception during a retry attempt, the exception is caught and logged, the entry is marked as `still_failed` with the error message stored in the state, and the retry loop continues to the next entry instead of crashing the entire retry run.",
]
prompt_claude = """You are working in a local project directory. Read the relevant code before changing anything. Do not commit, and do not write tokens or secrets into files.

Your task is to implement a new `ctpipe retry` subcommand that provides automatic recovery for pipeline tasks that ended in a failed or partial state. This involves creating new orchestration logic and wiring it into the existing CLI.

Here is what you need to build:

1. **New file `ctpipe/retry.py`** — Create this module with a public async function `retry_failed` that accepts parameters: `config: BatchConfig`, `task_ids: list[str] | None`, `models: list[str] | None`, `max_retries: int = 2`, `backoff_base: float = 5.0`, and `stages: list[str] | None = None`. This function is the retry orchestrator.

2. **Register in `ctpipe/cli.py`** — Add a `retry` subcommand to the existing argparse subparsers with these CLI arguments:
   - `--tasks` (optional filter by task ID, nargs="*")
   - `--models` (optional filter, nargs="*", choices=["qwen", "claude"])
   - `--max-retries` (int, default 2)
   - `--backoff-base` (float, default 5, in seconds)
   - `--stages` (optional, nargs="*", choices=["prepare", "run", "collect", "score"] — limits which stages are eligible for retry)
   Then add the dispatch branch that calls `retry_failed` via `asyncio.run()`.

3. **Retry orchestration logic** — Inside `retry_failed`:
   - Load `PipelineState` from `config.delivery_dir / "pipeline_state.json"`.
   - Use `select_delivery_tasks(config, task_ids)` to get the list of tasks to consider.
   - For each task, inspect all retryable stages (prepare, run, collect, score). For model-specific stages (run, collect, score), iterate over the filtered models list. For non-model stages (prepare), check once.
   - Identify entries where status is `"failed"` or `"partial"`.
   - If the `--stages` filter is provided, skip stages not in that list.
   - For each identified failed entry, retry up to `max_retries` times. Before each attempt, call `state.reset(task_id, stage, model)` to clear the old status, then invoke the appropriate stage function (reuse `prepare.prepare`, `run.run_single`, `collect.collect_single`, `score.score_single`).
   - Between retry attempts, apply exponential backoff: sleep for `backoff_base * (2 ** attempt)` seconds where `attempt` is zero-indexed.
   - If no failed/partial entries exist at all, print a clear message and exit cleanly.

4. **Summary output** — After all retries complete, print a formatted summary table showing: task_id, model (or "-" for non-model stages), stage, attempts made, and final_status ("recovered" if now "done", "still_failed" otherwise).

5. **State tracking** — For every retried entry, set a `retry_count` integer field in the PipelineState so downstream stages (like finalize) can see how many retries were needed.

Before writing any code, thoroughly read `ctpipe/cli.py`, `ctpipe/state.py`, `ctpipe/config.py`, and the function signatures in `ctpipe/run.py`, `ctpipe/collect.py`, `ctpipe/score.py`, and `ctpipe/prepare.py`. Follow the project's conventions for imports, type annotations, error handling, and print output formatting."""
followups_claude = [
  "The exponential backoff currently blocks the event loop with `asyncio.sleep`. Verify that the backoff uses `await asyncio.sleep(...)` and not `time.sleep(...)`. Also, add a `--dry-run` flag to the retry subcommand that scans and prints which tasks would be retried (with their stage and current status) but does not actually execute any retries or modify state.",
  "Add proper error handling to `retry_failed` so that if a stage function raises an unexpected exception during a retry attempt, the exception is caught and logged, the entry is marked as `still_failed` with the error message stored in the state, and the retry loop continues to the next entry instead of crashing the entire retry run.",
  "When the `prepare` stage is retried, it currently calls `prepare.prepare(config, task_ids)` which processes all tasks at once. Refactor the retry logic for the prepare stage so it only re-prepares the specific single task that failed, not the entire task list. You may need to pass `[task.id]` as the task_ids filter to `prepare.prepare`.",
  "The summary table printed at the end should be aligned with consistent column widths. Use fixed-width formatting (e.g., f-string padding or the `str.ljust` method) so the columns line up properly regardless of task_id or model name length. Also include a totals row at the bottom showing counts of recovered vs still_failed entries.",
  "Ensure that the `retry` subcommand is also integrated into the `all` pipeline flow in `cli.py`. After each stage in `_run_all_stages`, if any tasks failed, automatically trigger `retry_failed` for that stage with `max_retries=1` before proceeding to the next stage. Print a separator line before and after the automatic retry attempt.",
]

[[task]]
id = "CT-0004"
project_path = "D:\\path\\to\\runs\\_projects\\json_repair"
clone_method = "git"
task_type = "enhancement"
domain = "data_engineering"
language = "python"
prompt_qwen = """You are working in a local project directory. Read the relevant code before changing anything. Do not commit, and do not write tokens or secrets into files.

Add a new `status` subcommand to the ctpipe pipeline that gives users a single-command overview of batch progress across all tasks and pipeline stages.

## What to build

Create a new module `ctpipe/status.py` and register a `status` subcommand in `ctpipe/cli.py`. The subcommand must accept optional `--tasks`, `--models` (choices: qwen, claude), and `--format` (choices: table, json; default: table) arguments, following the same patterns as existing subcommands like `validate` and `finalize`.

## Report contents

The `status` command must produce a report with four sections:

1. **Per-task stage table**: For each task returned by `select_delivery_tasks()` from `config.py`, query `PipelineState.get()` from `state.py` for every stage (`prepare`, `run`, `collect`, `score`, `finalize`) and each requested model. Display the status of each stage-model combination (done/partial/failed/pending) in a formatted table. Stages that are model-independent (`prepare`) should show a single status; model-dependent stages (`run`, `collect`, `score`) should show separate qwen/claude columns.

2. **Aggregate counters**: Print totals — how many tasks are fully done end-to-end (all stages done for all models), how many have at least one failure, and how many are still pending (no stage started or some stages incomplete with no failures).

3. **Score summary**: For tasks where score files exist at `delivery_dir/scores/{model}/{task_id}.quality.toml`, read them with `read_quality_toml()` and compute passrates using `calc_passrate()` from `toml_utils.py`. Flag threshold violations using the same rules from `finalize.py`: qwen passrate must be < 0.7, claude passrate must be >= 0.71, and claude must be strictly greater than qwen.

4. **Artifact integrity checks**: For each stage marked as `done` in `pipeline_state.json`, verify the corresponding file actually exists on disk. Check trajectory JSONL files via `find_delivery_trajectory()` from `trajectory.py`, score TOML files at `scores/{model}/{task_id}.quality.toml`, and metadata markdown at `metadata/{task_id}.md`. Report any mismatches where state says done but the file is missing.

## Output formats

By default, print a human-readable table to stdout. When `--format json` is passed, output the entire report as a single valid JSON object containing all four sections.

## Edge cases

If no tasks are configured (empty `tasks.toml` and no task manifest), print a clear message like "No tasks configured. Add tasks to tasks.toml or generate them with `ctpipe gen`." and exit with code 0 — do not crash or print a traceback."""
followups_qwen = [
  "Add a `--stage` filter argument to the `status` command that accepts one or more stage names (prepare, run, collect, score, finalize) and limits the per-task table and integrity checks to only those stages. Update the CLI registration in `cli.py` and the report logic in `status.py` accordingly.",
  "Add a `--watch` flag to the `status` command that clears the terminal and refreshes the status table every 5 seconds until the user presses Ctrl+C. Use a simple polling loop that re-reads `pipeline_state.json` and reprints the table on each iteration. Handle KeyboardInterrupt gracefully by printing a final status snapshot before exiting.",
]
prompt_claude = """You are working in a local project directory. Read the relevant code before changing anything. Do not commit, and do not write tokens or secrets into files.

Implement a `status` subcommand for the ctpipe pipeline that provides a consolidated progress report for a batch run. Currently, users must manually inspect `pipeline_state.json` or run individual stages to determine what has succeeded, failed, or is still pending.

## Implementation requirements

### 1. New module: `ctpipe/status.py`

Create this module with a main entry function (e.g., `show_status(config, task_ids, models, output_format)`) that produces the report. It must import and use:
- `select_delivery_tasks` and `BatchConfig` from `ctpipe.config`
- `PipelineState` from `ctpipe.state`
- `find_delivery_trajectory` and `parse_trajectory` from `ctpipe.trajectory`
- `read_quality_toml` and `calc_passrate` from `ctpipe.toml_utils`

### 2. CLI registration in `ctpipe/cli.py`

Register a `status` subparser with these optional arguments:
- `--tasks`: specific task IDs to report on (nargs="*")
- `--models`: filter to specific models (nargs="*", choices=["qwen", "claude"], default=["qwen", "claude"])
- `--format`: output format (choices=["table", "json"], default="table")

Follow the existing subcommand registration pattern used by `validate` and `finalize`.

### 3. Report sections

**Per-task status table**: For each task from `select_delivery_tasks()`, show the completion status of every pipeline stage. The stages are `prepare`, `run`, `collect`, `score`, `finalize`. For model-dependent stages (`run`, `collect`, `score`), show separate statuses per model. Map the `status` field from `PipelineState.get()` to display values: "done" → ✓, "failed" → ✗, "partial" → ◐, anything else → ·  (pending).

**Aggregate counters**: Summarize total task count, fully completed (all stages done), failed (any stage failed), and pending (remaining).

**Score summary**: For scored tasks, read `scores/{model}/{task_id}.quality.toml` using `read_quality_toml()`, compute passrates with `calc_passrate()`, and check the threshold rules from `finalize.py`: qwen must be < 0.7, claude must be >= 0.71, and claude must be > qwen. Flag any violations.

**Artifact integrity**: When `PipelineState` reports a stage as "done", verify the expected artifact exists on disk:
- After `collect`: trajectory at `trajectories/{model}/{task_id}.jsonl` (use `find_delivery_trajectory()`)
- After `score`: score file at `scores/{model}/{task_id}.quality.toml`
- After `prepare`: metadata at `metadata/{task_id}.md`

Report mismatches as integrity warnings.

### 4. JSON output

When `--format json` is specified, output the full report as a valid JSON object to stdout. The JSON should contain keys for each section: `tasks` (per-task details), `summary` (aggregate counters), `scores` (passrate data), and `integrity_issues` (list of mismatch descriptions).

### 5. Empty state handling

When no tasks exist (empty config and no manifest), print a user-friendly message such as "No tasks configured." and return 0 — never crash or show a stack trace."""
followups_claude = [
  "Add a `--stage` filter argument to the `status` command (nargs=\"*\", choices=[\"prepare\",\"run\",\"collect\",\"score\",\"finalize\"]) that restricts the per-task table and integrity checks to only the specified stages. Wire it through `cli.py` and pass it into the status report function.",
  "Add a `--verbose` flag that, when set, expands each task row to show additional details: the session ID from `PipelineState`, the trajectory line count from `parse_trajectory()`, the individual criterion scores from `read_quality_toml()`, and any error messages stored in the pipeline state. In JSON mode, include these as nested objects under each task entry.",
  "Add a `--failing-only` flag that filters the per-task table to show only tasks that have at least one failed stage or a threshold violation. In JSON mode, the `tasks` array should likewise contain only failing entries. The aggregate summary should still reflect all tasks for context.",
  "Implement color-coded output for the human-readable table format using ANSI escape codes: green for done/passing, red for failed/threshold violations, yellow for partial, and dim gray for pending. Detect whether stdout is a TTY and disable colors when piping to a file or another command. Add a `--no-color` flag to force plain output even in a TTY.",
  "Add a `--export-csv` flag that writes the per-task status table to a CSV file at `delivery_dir/status_report.csv` with columns for task_id, each stage status, qwen_passrate, claude_passrate, threshold_ok, and any integrity issues. Print the file path after writing.",
]

[[task]]
id = "CT-0005"
project_path = "D:\\path\\to\\runs\\_projects\\CorsixTH"

  "Add a defensive check in the verify submission path that validates the trail array has a minimum number of points (e.g., at least 5) and that all points have monotonically increasing timestamps before sending the request. If the trail looks corrupted or too short, skip the server call and reset the slider with an appropriate user message.",
]
prompt_claude = """You are working in a local project directory. Read the relevant code before changing anything. Do not commit, and do not write tokens or secrets into files.

This SliderCaptcha project has a race condition bug in the verify flow inside `src/disk/longbow.slidercaptcha.js`. Here is how it manifests:

1. The user drags the slider puzzle piece to the target position and releases the mouse/touch, which triggers an AJAX verify request to the server.
2. Before the server responds, the user quickly grabs the slider again and begins a new drag, appending new coordinate points to the `trail` array.
3. When the first verify response arrives, its callback resets the slider position visually (moving the handle back to the start), but the `trail` array is not scoped to the original drag session — it now contains a mix of points from the completed first drag and the in-progress second drag.
4. When the user finishes the second drag and submits, the server receives a corrupted merged trajectory that fails verification even if the slider position was correct.

Your task is to fix this concurrency issue so that each drag-and-verify cycle is isolated from subsequent ones. Specifically:

1. **Session tracking**: Introduce a drag session generation counter (e.g., `_dragSessionId`) that increments at the start of every new drag. Capture the current session ID when the verify request is dispatched.
2. **Trail scoping**: Reset the `trail` array at the beginning of each new drag session, not in the verify response handler. This ensures each session starts with a clean trajectory.
3. **Stale response guarding**: In the verify response callback (both success and error paths), compare the captured session ID against the current `_dragSessionId`. If they differ, a new drag has started since the request was sent — silently discard the response without resetting the slider position, clearing the trail, or invoking success/failure UI updates.
4. **UI consistency**: If a stale verify response arrives while the user is mid-drag, the slider handle must remain at its current drag position with no visual jump or reset. Only the response from the active session should trigger UI state changes.
5. **Backward compatibility**: The fix must not alter behavior for the normal case where the user drags once, waits for the response, and then drags again. Single-drag-then-wait must work identically to before.
6. **Documentation**: Add a comment block in the source explaining the race condition scenario and the session-tracking mitigation.

Start by reading `src/disk/longbow.slidercaptcha.js` thoroughly to understand the existing drag event handlers, trail accumulation logic, verify request dispatch, and reset mechanism. Also review `src/index.html` to understand how the captcha is initialized and configured."""

  "The current fix may cause `xhook_clear()` to block if a refresh cycle is very long. Add a timeout mechanism: if `xhook_clear()` has been waiting longer than 500ms for an active refresh to finish, it should log a warning via `XH_LOG_WARN` and continue waiting rather than returning prematurely, so the caller is informed of the delay.",
  "Review `xh_core.c` for any other TAILQ or SLIST traversals that read hook_info entries outside the global mutex, and apply the same protection pattern to those code paths if needed.",
]
prompt_claude = """You are working in a local project directory. Read the relevant code before changing anything. Do not commit, and do not write tokens or secrets into files.

This is the xHook project — an Android native PLT (Procedure Linkage Table) hook library written in C. A use-after-free concurrency bug exists when `xhook_clear()` and `xhook_refresh()` execute simultaneously on different threads.

Here is how the bug manifests: In `libxhook/jni/xh_core.c`, `xhook_refresh()` snapshots the hook info queue head pointer, then invokes `xh_elf_hook()` (defined in `libxhook/jni/xh_elf.c`) to iterate through `xh_core_hook_info_t` linked-list entries for each symbol and perform PLT patching. The global mutex is released before this traversal begins. Meanwhile, `xhook_clear()` on another thread acquires the same mutex, walks the queue, frees all `xh_core_hook_info_t` nodes, and releases the lock. When the refresh thread resumes its traversal, it follows dangling pointers into freed heap memory, resulting in SIGSEGV crashes or silent corruption in multi-threaded Android applications.

Your task is to fix this use-after-free without introducing deadlocks and without changing the public API surface. The hook_info nodes that are being actively traversed by `xhook_refresh()` must remain valid until the refresh cycle completes. You may use a deferred-deletion pattern (e.g., a pending-delete flag that the refresh checks after finishing its current pass) or a reference-counting scheme (e.g., an atomic read-reference counter that `xhook_clear()` spins on or waits on before freeing). The fix must not significantly degrade performance of the hot `xhook_refresh()` code path.

Requirements:
1. The use-after-free is eliminated: concurrent `xhook_clear()` and `xhook_refresh()` no longer access freed hook_info memory.
2. No deadlock is introduced between the global mutex and the refresh iteration path.
3. The public API contract (`xhook_register`, `xhook_clear`, `xhook_refresh` signatures and `xhook.h` declarations) remains unchanged.
4. All hook_info nodes are eventually freed after both clear and refresh complete — no permanent memory leaks.
5. The edge case of `xhook_clear()` being called multiple times in rapid succession during a single refresh cycle is handled correctly.
6. A comment block in `xh_core.c` documents the synchronization strategy between clear and refresh.

Start by reading all key files: `libxhook/jni/xh_core.c`, `libxhook/jni/xh_core.h`, `libxhook/jni/xh_elf.c`, `libxhook/jni/xh_elf.h`, `libxhook/jni/xhook.c`, `libxhook/jni/xhook.h`, and `libxhook/jni/queue.h`."""
followups_claude = [
  "Write a concurrent stress test in a new file `libtest/jni/test_concurrent.c` that launches two pthreads — one repeatedly calling `xhook_refresh()` and the other repeatedly calling `xhook_clear()` then `xhook_register()` — running for at least 5 seconds. The test should exit with code 0 on success and non-zero on any crash or assertion failure.",
  "Examine whether `xhook_register()` called concurrently with `xhook_refresh()` has a similar data race when appending new hook_info nodes to the queue while refresh is iterating. If so, extend your synchronization fix to cover that case as well.",

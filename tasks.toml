task_description = """在 `advertising/src/main/scala/JdbcHelper.scala` 中，`AdStatDAO.updateBatch`、`AdUserClickCountDAO.updateBatch` 和 `AdClickTrendDAO.updateBatch` 三个方法均采用了相同的低效模式：先用SELECT查询记录是否存在，然后分别执行INSERT或UPDATE。这种方式在高并发实时流处理场景下存在以下问题：

1. **性能问题**：每条记录需要一次SELECT + 一次INSERT/UPDATE，即2次数据库交互，在Spark Streaming每5秒一个batch的场景下开销巨大。
2. **并发安全问题**：SELECT和INSERT/UPDATE之间没有事务保护，可能出现两个分区同时判断记录不存在然后同时INSERT导致重复数据。
3. **代码重复**：三个DAO的updateBatch方法逻辑几乎完全相同，违反DRY原则。

请进行以下优化：

1. **为 `ad_user_click_count`、`ad_stat`、`ad_click_trend` 三张表添加合适的唯一索引或联合主键**（修改 `advertising/src/main/resources/ad.sql`），使 MySQL 能使用 `INSERT ... ON DUPLICATE KEY UPDATE` 语法。

2. **将三个DAO的updateBatch方法重构为单条 `INSERT ... ON DUPLICATE KEY UPDATE` SQL**：
   - `ad_user_click_count`：clickCount字段应执行累加（`clickCount = clickCount + VALUES(clickCount)`）
   - `ad_stat`：clickCount字段应执行覆盖（`clickCount = VALUES(clickCount)`）
   - `ad_click_trend`：clickCount字段应执行覆盖

3. **可选**：抽取通用的 `upsertBatch` 方法到 `JdbcHelper` 中减少重复代码。"""
acceptance_criteria = [
  "ad.sql 中为 ad_user_click_count 添加了 (date, userid, adid) 联合唯一键，为 ad_stat 添加了 (date, province, city, adid) 联合唯一键，为 ad_click_trend 添加了 (date, hour, minute, adid) 联合唯一键",
  "AdUserClickCountDAO.updateBatch 重构为单条 INSERT ... ON DUPLICATE KEY UPDATE 语句，clickCount 使用累加语义",
  "AdStatDAO.updateBatch 和 AdClickTrendDAO.updateBatch 重构为单条 INSERT ... ON DUPLICATE KEY UPDATE 语句，clickCount 使用覆盖语义",

prompt_qwen = """You are working in a local project directory. Read the relevant code before changing anything. Do not commit, and do not write tokens or secrets into files.

This project is xHook, an Android PLT hook library written in C. There is a use-after-free bug triggered when `xhook_clear()` and `xhook_refresh()` are called concurrently from different threads.

The root cause is in `libxhook/jni/xh_core.c`. When `xhook_refresh()` runs, it snapshots the hook info queue head and then calls into `xh_elf_hook()` (in `libxhook/jni/xh_elf.c`), which traverses the linked list of `xh_core_hook_info_t` entries for each symbol. The global mutex is not held during this traversal and PLT patching loop. If another thread calls `xhook_clear()` in the meantime, it acquires the mutex, frees every `xh_core_hook_info_t` node from the queue, and releases the lock. The refresh thread then dereferences freed memory, causing a SIGSEGV or silent heap corruption.

Fix this concurrency bug so that hook_info nodes actively referenced by an in-progress `xhook_refresh()` cycle are not freed until the refresh completes. Acceptable approaches include a deferred-delete flag checked after refresh finishes, or a read-reference count that `xhook_clear()` waits on before freeing. Your fix must:

1. Eliminate the use-after-free: `xhook_clear()` on thread A during `xhook_refresh()` on thread B must never access freed hook_info memory.
2. Introduce no deadlocks between the mutex used by `xhook_clear` and the refresh iteration path.
3. Keep the public API unchanged — `xhook_register()`, `xhook_clear()`, and `xhook_refresh()` must retain their existing signatures and declarations in `xhook.h`.
4. Ensure all hook_info nodes are eventually freed after both clear and refresh complete, with no permanent memory leaks.
5. Handle the edge case where `xhook_clear()` is called multiple times in rapid succession during a single refresh cycle.
6. Add a comment block in `xh_core.c` documenting the synchronization strategy between clear and refresh for future maintainers.

Key files to examine: `libxhook/jni/xh_core.c`, `libxhook/jni/xh_core.h`, `libxhook/jni/xh_elf.c`, `libxhook/jni/xh_elf.h`, `libxhook/jni/xhook.c`, `libxhook/jni/xhook.h`, and `libxhook/jni/queue.h`."""
